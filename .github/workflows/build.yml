name: Flutter Build APK & AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install Android SDK 35 (Android 15 files)
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"

      - name: Fix Android Folder
        run: |
          rm -rf android
          flutter create --platforms android --project-name dopamine_detox .
          # Kotlin Version Fix
          sed -i -E 's/id "org.jetbrains.kotlin.android" version "[^"]+"/id "org.jetbrains.kotlin.android" version "1.9.24"/g' android/settings.gradle || true
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' android/build.gradle || true
          # Force SDK 35 safely
          sed -i 's/flutter.compileSdkVersion/35/g' android/app/build.gradle || true
          sed -i 's/flutter.targetSdkVersion/35/g' android/app/build.gradle || true
      
      - name: Install Packages
        run: flutter pub get

      - name: Build APK (Mobile ke liye)
        run: flutter build apk --release

      - name: Build AAB (Play Store ke liye)
        run: flutter build appbundle --release

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: dopamine-detox-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB File
        uses: actions/upload-artifact@v4
        with:
          name: dopamine-detox-aab
          path: build/app/outputs/bundle/release/app-release.aab
