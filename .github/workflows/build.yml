name: Flutter Build APK & AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Master Override (Force Kotlin 1.9.24 on all plugins)
        run: |
          rm -rf android
          flutter create --platforms android --project-name dopamine_detox .

          # Step 1: Root level par naya Kotlin set karna
          sed -i -E 's/id "org.jetbrains.kotlin.android" version "[^"]+"/id "org.jetbrains.kotlin.android" version "1.9.24"/g' android/settings.gradle || true
          
          # Step 2: Sabhi purane packages (jaise pedometer) ko force karna
          cat <<'EOF' >> android/build.gradle
          
          subprojects {
              buildscript {
                  configurations.all {
                      resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                          if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.contains('kotlin-gradle-plugin')) {
                              details.useVersion "1.9.24"
                          }
                      }
                  }
              }
          }
          EOF

      - name: Install Packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: dopamine-detox-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB File
        uses: actions/upload-artifact@v4
        with:
          name: dopamine-detox-aab
          path: build/app/outputs/bundle/release/app-release.aab
