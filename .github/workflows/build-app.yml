name: Build Android APK

on:
  push:
    branches: ["Merge-app"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Download Orbitron fonts
        run: |
          mkdir -p flutter_export/assets/fonts
          # Orbitron is now a single variable font in the Google Fonts repo.
          # Download it once and alias it to the two filenames pubspec.yaml expects.
          curl -fL --globoff \
            -o flutter_export/assets/fonts/Orbitron-VF.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/orbitron/Orbitron%5Bwght%5D.ttf"
          cp flutter_export/assets/fonts/Orbitron-VF.ttf flutter_export/assets/fonts/Orbitron-Bold.ttf
          cp flutter_export/assets/fonts/Orbitron-VF.ttf flutter_export/assets/fonts/Orbitron-Regular.ttf

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > flutter_export/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> flutter_export/android/local.properties

      - name: Get dependencies
        working-directory: flutter_export
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_export
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mera-Game-APK
          path: flutter_export/build/app/outputs/flutter-apk/app-release.apk
