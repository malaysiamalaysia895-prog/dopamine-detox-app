name: Build Android APK

on:
  push:
    branches: [ "Merge-app" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: The Final Master Build
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" | head -n 1)
          DIR=$(dirname "$PUBSPEC")
          cd "$DIR"
          
          flutter clean
          
          # 1. KACHRA SAAF KAREIN: Purani aur nayi files ki ladaai khatam karne ke liye unhe hata rahe hain.
          # (Chinta mat kijiye, AdMob wali Manifest file bilkul safe rahegi)
          rm -f android/build.gradle android/build.gradle.kts
          rm -f android/settings.gradle android/settings.gradle.kts
          rm -f android/app/build.gradle android/app/build.gradle.kts
          
          # 2. FRESH START: Naye aur ekdum clean files automatically banayein
          flutter create .
          
          # 3. KOTLIN VERSION FIX: Jo error abhi aapko aaya tha, use hamesha ke liye block karna
          echo "kotlin_version=1.9.22" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 4. ADS FIX (minSdkVersion 21): Jo Agent credit khatam hone se nahi kar paya, wo humne yahan force kar diya
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle.kts || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle.kts || true
          
          # 5. Ads ka package wapas add karke fresh download karein
          flutter pub add google_mobile_ads
          flutter pub get
          
          # Final APK Build
          flutter build apk --release --no-shrink
          
          mkdir -p $GITHUB_WORKSPACE/output
          find build -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output/ \;
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mera-Game-APK
          path: output/*.apk
