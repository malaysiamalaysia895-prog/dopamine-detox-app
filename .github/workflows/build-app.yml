name: Build Android APK

on:
  push:
    branches: [ "Merge-app" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: The Final Master Build
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" | head -n 1)
          DIR=$(dirname "$PUBSPEC")
          cd "$DIR"
          
          flutter clean
          
          # Kachra saaf karein
          rm -f android/build.gradle android/build.gradle.kts
          rm -f android/settings.gradle android/settings.gradle.kts
          rm -f android/app/build.gradle android/app/build.gradle.kts
          
          # Fresh Android files banayein
          flutter create .
          
          # 3. KOTLIN VERSION FIX: 2.0.0 set kar diya gaya hai
          echo "kotlin_version=2.0.0" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 4. ADS FIX (minSdkVersion 21)
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle.kts || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle.kts || true
          
          flutter pub add google_mobile_ads
          flutter pub get
          
          # 5. FINAL APK BUILD (Bypass flag ke sath taaki koi naya error na aaye)
          flutter build apk --release --no-shrink --android-skip-build-dependency-validation
          
          mkdir -p $GITHUB_WORKSPACE/output
          find build -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output/ \;
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mera-Game-APK
          path: output/*.apk
