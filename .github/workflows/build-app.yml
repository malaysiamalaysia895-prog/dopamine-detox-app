name: Build Android APK

on:
  push:
    branches: [ "Merge-app" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: The Final Master Build
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" | head -n 1)
          DIR=$(dirname "$PUBSPEC")
          cd "$DIR"
          
          flutter clean
          
          # 1. Kachra saaf karein
          rm -f android/build.gradle android/build.gradle.kts
          rm -f android/settings.gradle android/settings.gradle.kts
          rm -f android/app/build.gradle android/app/build.gradle.kts
          
          # 2. Fresh Android files banayein
          flutter create .
          
          # 3. KOTLIN & DSL FIX
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "android.newDsl=false" >> android/gradle.properties
          
          sed -i 's/1.9.22/2.0.0/g' android/settings.gradle || true
          sed -i 's/1.9.24/2.0.0/g' android/settings.gradle || true
          sed -i 's/ext.kotlin_version =.*/ext.kotlin_version = "2.0.0"/g' android/build.gradle || true
          
          # 4. ADS FIX (minSdkVersion 21)
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle || true
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle.kts || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle.kts || true
          
          flutter pub add google_mobile_ads
          flutter pub get
          
          # 5. DART SPELLING FIX
          sed -i 's/navigationBarIconBrightness/systemNavigationBarIconBrightness/g' lib/main.dart || true
          sed -i 's/navigationBarColor/systemNavigationBarColor/g' lib/main.dart || true
          
          # 6. ASLI FONT DOWNLOAD FIX (Bold aur Regular dono ab automatic aayenge)
          mkdir -p assets/fonts
          curl -L -o assets/fonts/Orbitron-Bold.ttf "https://raw.githubusercontent.com/google/fonts/main/ofl/orbitron/Orbitron-Bold.ttf"
          curl -L -o assets/fonts/Orbitron-Regular.ttf "https://raw.githubusercontent.com/google/fonts/main/ofl/orbitron/Orbitron-Regular.ttf"
          
          # 7. FINAL APK BUILD
          flutter build apk --release --no-shrink
          
          mkdir -p $GITHUB_WORKSPACE/output
          find build -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output/ \;
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mera-Game-APK
          path: output/*.apk
