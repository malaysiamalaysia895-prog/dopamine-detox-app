name: Build Android APK

on:
  push:
    branches: [ "Merge-app" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: The Bulletproof Build
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" | head -n 1)
          DIR=$(dirname "$PUBSPEC")
          cd "$DIR"
          
          flutter clean
          
          # 1. TOOTI HUI FILES KO REPAIR KARNA (Unsupported Gradle Fix)
          # Note: Isse aapka lib/main.dart (Game Code) bilkul touch nahi hoga, sirf Android ka dhancha naya banega.
          rm -rf android/
          flutter create .
          
          # 2. KOTLIN & DSL FIX
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "android.newDsl=false" >> android/gradle.properties
          
          sed -i 's/1.9.22/2.0.0/g' android/settings.gradle || true
          sed -i 's/1.9.24/2.0.0/g' android/settings.gradle || true
          sed -i 's/ext.kotlin_version =.*/ext.kotlin_version = "2.0.0"/g' android/build.gradle || true
          
          # 3. ADS FIX (minSdkVersion 21)
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle || true
          
          flutter pub add google_mobile_ads
          flutter pub get
          
          # 4. GAME SPELLING & FONT FIX (Direct code theek kiya)
          sed -i 's/navigationBarIconBrightness/systemNavigationBarIconBrightness/g' lib/main.dart || true
          sed -i 's/navigationBarColor/systemNavigationBarColor/g' lib/main.dart || true
          
          mkdir -p assets/fonts
          curl -L -o assets/fonts/Orbitron-Bold.ttf "https://raw.githubusercontent.com/google/fonts/main/ofl/orbitron/Orbitron-Bold.ttf"
          curl -L -o assets/fonts/Orbitron-Regular.ttf "https://raw.githubusercontent.com/google/fonts/main/ofl/orbitron/Orbitron-Regular.ttf"
          
          # 5. BLACK SCREEN CRASH FIX (Internet Permissions aur AdMob ID ekdum safe tarike se andar daali)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-8566652140087308~1114269136"/>' android/app/src/main/AndroidManifest.xml
          
          # 6. R8 COMPRESSOR FIX (Gradle file ka structure bina tode, sahi jagah Play Core add kiya)
          sed -i '/dependencies {/a \    implementation "com.google.android.play:core:1.10.3"' android/app/build.gradle
          
          # 7. FINAL APK BUILD (Bina koi main file udaye)
          flutter build apk --release --no-shrink
          
          mkdir -p $GITHUB_WORKSPACE/output
          find build -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output/ \;
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mera-Game-APK
          path: output/*.apk
