name: Build Android APK

on:
  push:
    branches: [ "Merge-app" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          
      - name: Auto-Find Project, Fix Android, and Build
        run: |
          echo "Dhoondh raha hoon pubspec.yaml kahan hai..."
          PUBSPEC=$(find . -name "pubspec.yaml" | head -n 1)
          DIR=$(dirname "$PUBSPEC")
          echo "Folder mil gaya yahan: $DIR"
          cd "$DIR"
          
          # Pehle packages ko latest version par update karein
          flutter pub get
          flutter pub upgrade
          
          echo "Replit ki missing Android files ko naya bana raha hoon..."
          flutter create .
          
          # Final APK banayega
          flutter build apk --release
          
          mkdir -p $GITHUB_WORKSPACE/output
          find build -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output/ \;
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mera-Game-APK
          path: output/*.apk
          
