name: Build & Sign Android APK

on:
  push:
    branches: ["Merge-app"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Pre-flight validation ────────────────────────────────────────────────
      # Runs before any toolchain is installed — fails fast with a clear message
      # instead of wasting minutes downloading Flutter/Gradle only to crash later.
      - name: Validate Android configuration
        run: |
          set -euo pipefail
          PASS=true

          check() {
            local label="$1"; local file="$2"
            if [ -f "$file" ]; then
              echo "  ✅  $label"
            else
              echo "  ❌  MISSING: $label  →  $file"
              PASS=false
            fi
          }

          grep_check() {
            local label="$1"; local pattern="$2"; local file="$3"
            if grep -q "$pattern" "$file" 2>/dev/null; then
              echo "  ✅  $label"
            else
              echo "  ❌  NOT FOUND: $label  (pattern: $pattern)  →  $file"
              PASS=false
            fi
          }

          echo ""
          echo "═══════════════════════════════════════"
          echo "  Android Pre-Build Validation"
          echo "═══════════════════════════════════════"

          # ── Required Gradle files ──────────────────────────────────────────
          echo ""
          echo "── Gradle files ──"
          check "settings.gradle"          "flutter_export/android/settings.gradle"
          check "root build.gradle"        "flutter_export/android/build.gradle"
          check "app build.gradle"         "flutter_export/android/app/build.gradle"
          check "gradle-wrapper.props"     "flutter_export/android/gradle/wrapper/gradle-wrapper.properties"
          check "gradle.properties"        "flutter_export/android/gradle.properties"
          check "proguard-rules.pro"       "flutter_export/android/app/proguard-rules.pro"

          # ── Declarative plugin syntax (not old apply-from) ─────────────────
          echo ""
          echo "── Gradle plugin syntax ──"
          grep_check "settings.gradle uses pluginManagement{}" \
            "pluginManagement" "flutter_export/android/settings.gradle"
          grep_check "settings.gradle declares flutter-plugin-loader" \
            "dev.flutter.flutter-plugin-loader" "flutter_export/android/settings.gradle"
          grep_check "AGP ≥ 8.6 (8.7.x declared)" \
            "com.android.application.*8\.[6-9]" "flutter_export/android/settings.gradle"
          grep_check "app build.gradle uses org.jetbrains.kotlin.android" \
            "org.jetbrains.kotlin.android" "flutter_export/android/app/build.gradle"
          if grep -q "app_plugin_loader.gradle" flutter_export/android/settings.gradle 2>/dev/null; then
            echo "  ❌  FATAL: old 'apply from: app_plugin_loader.gradle' still present in settings.gradle"
            PASS=false
          else
            echo "  ✅  Old imperative app_plugin_loader removed"
          fi

          # ── Gradle wrapper version ──────────────────────────────────────────
          echo ""
          echo "── Gradle wrapper ──"
          GRADLE_VER=$(grep distributionUrl flutter_export/android/gradle/wrapper/gradle-wrapper.properties \
            | grep -oP 'gradle-\K[0-9]+\.[0-9]+' || true)
          if [ -z "$GRADLE_VER" ]; then
            echo "  ❌  Could not parse Gradle version from gradle-wrapper.properties"
            PASS=false
          else
            MAJOR=$(echo "$GRADLE_VER" | cut -d. -f1)
            MINOR=$(echo "$GRADLE_VER" | cut -d. -f2)
            if [ "$MAJOR" -gt 8 ] || { [ "$MAJOR" -eq 8 ] && [ "$MINOR" -ge 9 ]; }; then
              echo "  ✅  Gradle $GRADLE_VER (≥ 8.9 required for AGP 8.7.x)"
            else
              echo "  ❌  Gradle $GRADLE_VER is below 8.9 — AGP 8.7.x will fail"
              PASS=false
            fi
          fi

          # ── AndroidManifest ────────────────────────────────────────────────
          MANIFEST="flutter_export/android/app/src/main/AndroidManifest.xml"
          echo ""
          echo "── AndroidManifest.xml ──"
          check "AndroidManifest.xml"  "$MANIFEST"
          grep_check "INTERNET permission"      "INTERNET"       "$MANIFEST"
          grep_check "flutterEmbedding=2"       "flutterEmbedding" "$MANIFEST"
          grep_check "AdMob APPLICATION_ID"     "APPLICATION_ID" "$MANIFEST"

          # Validate AdMob App ID format: ca-app-pub-XXXXXXXXXXXXXXXX~XXXXXXXXXX
          ADMOB_ID=$(grep -oP 'ca-app-pub-[0-9]+~[0-9]+' "$MANIFEST" || true)
          if [ -n "$ADMOB_ID" ]; then
            echo "  ✅  AdMob App ID present: $ADMOB_ID"
          else
            echo "  ❌  AdMob App ID missing or malformed (expected ca-app-pub-XXXXXXXX~XXXXXXXXXX)"
            PASS=false
          fi

          # ── Android resources ─────────────────────────────────────────────
          echo ""
          echo "── Android resources ──"
          check "styles.xml (LaunchTheme)"  "flutter_export/android/app/src/main/res/values/styles.xml"
          grep_check "LaunchTheme defined"  "LaunchTheme" \
            "flutter_export/android/app/src/main/res/values/styles.xml"
          check "ic_launcher mdpi"    "flutter_export/android/app/src/main/res/mipmap-mdpi/ic_launcher.png"
          check "ic_launcher hdpi"    "flutter_export/android/app/src/main/res/mipmap-hdpi/ic_launcher.png"
          check "ic_launcher xhdpi"   "flutter_export/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png"
          check "ic_launcher xxhdpi"  "flutter_export/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png"
          check "ic_launcher xxxhdpi" "flutter_export/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png"

          # ── Dart / pubspec ────────────────────────────────────────────────
          echo ""
          echo "── Flutter project ──"
          check "pubspec.yaml"    "flutter_export/pubspec.yaml"
          check "lib/main.dart"   "flutter_export/lib/main.dart"
          grep_check "Orbitron-Bold.ttf declared in pubspec" \
            "Orbitron-Bold.ttf" "flutter_export/pubspec.yaml"
          grep_check "Rewarded ad unit ID in ad_manager.dart" \
            "ca-app-pub-8566652140087308/7306930941" \
            "flutter_export/lib/services/ad_manager.dart"
          grep_check "Interstitial ad unit ID in ad_manager.dart" \
            "ca-app-pub-8566652140087308/3659026052" \
            "flutter_export/lib/services/ad_manager.dart"

          # ── ProGuard completeness check ────────────────────────────────────
          echo ""
          echo "── ProGuard rules ──"
          PGFILE="flutter_export/android/app/proguard-rules.pro"
          grep_check "AdMob core kept"              "gms.ads"                     "$PGFILE"
          grep_check "RewardItem kept"              "RewardItem"                  "$PGFILE"
          grep_check "FullScreenContentCallback kept" "FullScreenContentCallback" "$PGFILE"
          grep_check "UMP consent SDK kept"         "ump"                         "$PGFILE"
          grep_check "google_mobile_ads plugin kept" "googlemobileads"            "$PGFILE"

          # ── Summary ───────────────────────────────────────────────────────
          echo ""
          echo "═══════════════════════════════════════"
          if [ "$PASS" = true ]; then
            echo "  ✅  All checks passed — proceeding to build"
          else
            echo "  ❌  One or more checks FAILED — fix the issues above before retrying"
            exit 1
          fi
          echo "═══════════════════════════════════════"
          echo ""

      # ── Toolchain setup ──────────────────────────────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Download Orbitron fonts
        run: |
          mkdir -p flutter_export/assets/fonts
          # Orbitron is now a single variable font in the Google Fonts repo.
          # Download it once and alias it to the two filenames pubspec.yaml expects.
          curl -fL --globoff \
            -o flutter_export/assets/fonts/Orbitron-VF.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/orbitron/Orbitron%5Bwght%5D.ttf"
          cp flutter_export/assets/fonts/Orbitron-VF.ttf flutter_export/assets/fonts/Orbitron-Bold.ttf
          cp flutter_export/assets/fonts/Orbitron-VF.ttf flutter_export/assets/fonts/Orbitron-Regular.ttf

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > flutter_export/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> flutter_export/android/local.properties

      - name: Get dependencies
        working-directory: flutter_export
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_export
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Mera-Game-APK
          path: flutter_export/build/app/outputs/flutter-apk/app-release.apk

      # ── Debug APK — for testing ads ──────────────────────────────────────────
      # In a debug build kDebugMode=true so AdManager uses Google's test ad IDs
      # (ca-app-pub-3940256099942544/...) which ALWAYS show test ads regardless
      # of device, location, or AdMob account status. Use this APK to verify
      # that ads load and show correctly before publishing.
      - name: Build debug APK (for ad testing)
        working-directory: flutter_export
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Mera-Game-APK-DEBUG
          path: flutter_export/build/app/outputs/flutter-apk/app-debug.apk
