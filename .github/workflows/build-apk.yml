name: Build & Sign Android APK

on:
  push:
    branches:
      - Merge-app
  workflow_dispatch:

jobs:
  build:
    name: Flutter Android Release Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Merge-app
        uses: actions/checkout@v4
        with:
          ref: Merge-app

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_export
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > flutter_export/android/app/release.keystore
          else
            echo "No keystore secret - skipping"
          fi

      - name: Write key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=app/release.keystore\n' \
              "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
              > flutter_export/android/key.properties
          else
            echo "Skipping key.properties - no keystore configured"
          fi

      - name: Build release APK
        working-directory: flutter_export
        run: flutter build apk --release

      - name: Collect APK artifacts
        run: |
          mkdir -p dist
          for f in flutter_export/build/app/outputs/flutter-apk/*.apk; do
            [ -f "$f" ] && cp "$f" "dist/TechTycoonMerge-$(basename "$f")"
          done
          ls -lh dist/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: TechTycoonMerge-${{ github.run_number }}
          path: dist/*.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "### APK Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in dist/*.apk; do
            [ -f "$f" ] && echo "| $(basename "$f") | $(du -sh "$f" | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          done
