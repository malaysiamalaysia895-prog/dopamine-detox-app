name: dopamine_detox
description: Dopamine Detox, Habit Builder & Health App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
    
  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.3

  # Installed apps
  device_apps: ^2.2.0

  # Permissions
  permission_handler: ^11.3.1

  # Overlay window for app lock
  flutter_overlay_window: ^0.4.2

  # Google Play Billing / IAP
  in_app_purchase: ^3.1.13

  # Onboarding page indicator
  smooth_page_indicator: ^1.1.0

  # Pedometer for step tracking (Updated version)
  pedometer: any

  # Lottie animations
  lottie: ^3.1.2

  # HTTP for network images (fallback)
  cached_network_image: ^3.3.1

  # UUID for unique IDs
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
