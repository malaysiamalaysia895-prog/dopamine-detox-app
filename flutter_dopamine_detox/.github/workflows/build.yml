name: Flutter Build — APK & AAB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Also allows you to trigger a build manually from GitHub's Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 (required by Gradle & Android SDK) ──────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Set up Flutter (stable channel) ────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # ── 4. Verify Flutter install ──────────────────────────────────────────
      - name: Flutter version
        run: flutter --version

      # ── 5. Install dependencies ────────────────────────────────────────────
      - name: Get Flutter packages
        working-directory: flutter_dopamine_detox
        run: flutter pub get

      # ── 6. Decode & write keystore from GitHub Secret ─────────────────────
      #
      # HOW TO SET THIS UP (one-time, takes 3 minutes):
      #
      # a) On your local machine, base64-encode your keystore:
      #      base64 android/keystore/upload-keystore.jks > keystore_b64.txt
      #
      # b) In GitHub → your repo → Settings → Secrets and variables
      #    → Actions → New repository secret. Add these 4 secrets:
      #
      #      KEYSTORE_BASE64      ← paste the entire content of keystore_b64.txt
      #      KEY_STORE_PASSWORD   ← your keystore password
      #      KEY_PASSWORD         ← your key password
      #      KEY_ALIAS            ← upload  (or whatever alias you used)
      #
      # The step below decodes the secret back into a real .jks file at
      # build time. The file never exists in your repo.

      - name: Decode keystore
        working-directory: flutter_dopamine_detox
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p android/keystore
            echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore/upload-keystore.jks
            echo "✅ Keystore decoded successfully"
          else
            echo "⚠️  KEYSTORE_BASE64 secret not set — build will use debug signing"
          fi

      # ── 7. Write key.properties from secrets ──────────────────────────────
      - name: Write key.properties
        working-directory: flutter_dopamine_detox
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$KEY_STORE_PASSWORD" ]; then
            cat > android/key.properties <<EOF
          storePassword=${KEY_STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=../android/keystore/upload-keystore.jks
          EOF
            echo "✅ key.properties written"
          else
            echo "⚠️  Signing secrets not set — using debug signing"
          fi

      # ── 8. Build release APK ───────────────────────────────────────────────
      - name: Build release APK
        working-directory: flutter_dopamine_detox
        run: flutter build apk --release --no-shrink

      # ── 9. Build release AAB (Play Store) ─────────────────────────────────
      - name: Build release AAB
        working-directory: flutter_dopamine_detox
        run: flutter build appbundle --release

      # ── 10. Rename outputs with version + date for clarity ────────────────
      - name: Rename build outputs
        working-directory: flutter_dopamine_detox
        run: |
          DATE=$(date +'%Y%m%d_%H%M')
          mkdir -p release_output

          cp build/app/outputs/flutter-apk/app-release.apk \
             release_output/DopamineDetox_${DATE}.apk

          cp build/app/outputs/bundle/release/app-release.aab \
             release_output/DopamineDetox_${DATE}.aab

          echo "APK_NAME=DopamineDetox_${DATE}.apk" >> $GITHUB_ENV
          echo "AAB_NAME=DopamineDetox_${DATE}.aab" >> $GITHUB_ENV
          ls -lh release_output/

      # ── 11. Upload APK as downloadable artifact ────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: flutter_dopamine_detox/release_output/*.apk
          retention-days: 30      # artifact stays downloadable for 30 days

      # ── 12. Upload AAB as downloadable artifact ────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.AAB_NAME }}
          path: flutter_dopamine_detox/release_output/*.aab
          retention-days: 30

      # ── 13. Print download reminder in logs ───────────────────────────────
      - name: Build complete
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  ✅  BUILD COMPLETE                                      ║"
          echo "║                                                          ║"
          echo "║  Download your files:                                    ║"
          echo "║  GitHub → your repo → Actions → this run → Artifacts    ║"
          echo "║                                                          ║"
          echo "║  APK  →  install directly on any Android device         ║"
          echo "║  AAB  →  upload to Google Play Console                  ║"
          echo "╚══════════════════════════════════════════════════════════╝"
